<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دبوس اونلاين</title>
    
    <!-- أيقونة الموقع -->
    <link rel="icon" type="image/jpg" href="images/دبوس اونلاين.jpg">
    <link rel="shortcut icon" type="image/jpg" href="images/دبوس اونلاين.jpg">
    
    <!-- خط Cairo -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Cairo', sans-serif;
        }
        
        body {
            background-color: #f5f5f5;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            border-radius: 15px;
            margin-bottom: 30px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }
        
        .logo-container {
            display: flex;
            align-items: center;
            gap: 20px;
        }
        
        .store-logo {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid white;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            background-color: white;
        }
        
        .store-title {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
        }
        
        h1 {
            font-size: 2.5em;
            margin-bottom: 5px;
        }
        
        .subtitle {
            font-size: 1.2em;
            opacity: 0.9;
        }
        
        .filter-container {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .filter-btn {
            background: white;
            border: 2px solid #667eea;
            color: #667eea;
            padding: 12px 25px;
            margin: 5px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 1em;
            transition: all 0.3s;
            font-weight: bold;
        }
        
        .filter-btn:hover,
        .filter-btn.active {
            background: #667eea;
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.3);
        }
        
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
            padding: 10px;
        }
        
        .product-card {
            background: white;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0,0,0,0.08);
            transition: transform 0.3s, box-shadow 0.3s;
        }
        
        .product-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
        }
        
        .product-image {
            width: 100%;
            height: 250px;
            object-fit: cover;
            background-color: #f0f0f0;
        }
        
        .product-info {
            padding: 20px;
        }
        
        .product-category {
            color: #667eea;
            font-size: 0.9em;
            font-weight: bold;
            margin-bottom: 8px;
        }
        
        .product-name {
            font-size: 1.4em;
            color: #333;
            margin-bottom: 10px;
            font-weight: bold;
        }
        
        .product-description {
            color: #666;
            font-size: 0.95em;
            line-height: 1.6;
            margin-bottom: 15px;
        }
        
        .product-price {
            font-size: 1.6em;
            color: #667eea;
            font-weight: bold;
            margin-bottom: 15px;
        }
        
        .whatsapp-btn {
            display: block;
            width: 100%;
            background: #25D366;
            color: white;
            text-align: center;
            padding: 14px;
            border-radius: 10px;
            text-decoration: none;
            font-weight: bold;
            font-size: 1.1em;
            transition: background 0.3s;
            border: none;
            cursor: pointer;
        }
        
        .whatsapp-btn:hover {
            background: #20BA5A;
        }
        
        footer {
            text-align: center;
            margin-top: 50px;
            padding: 20px;
            color: #666;
            font-size: 0.9em;
        }
        
        .loading {
            text-align: center;
            padding: 50px;
            font-size: 1.5em;
            color: #667eea;
        }
        
        .error {
            text-align: center;
            padding: 50px;
            font-size: 1.2em;
            color: red;
        }
        
        @media (max-width: 768px) {
            header {
                flex-direction: column;
                text-align: center;
            }
            
            .logo-container {
                flex-direction: column;
                align-items: center;
            }
            
            .store-title {
                align-items: center;
                text-align: center;
            }
            
            h1 {
                font-size: 1.8em;
            }
            
            .store-logo {
                width: 80px;
                height: 80px;
            }
            
            .products-grid {
                grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
                gap: 15px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="logo-container">
                <img src="images/دبوس اونلاين.jpg" alt="شعار المتجر" class="store-logo" onerror="this.style.display='none'">
                <div class="store-title">
                    <h1 id="storeName">دبوس اونلاين</h1>
                    <div class="subtitle">من الأساس حتى التشطيب</div>
                </div>
            </div>
        </header>
        
        <div class="filter-container" id="filterContainer"></div>
        
        <div class="products-grid" id="productsGrid">
            <div class="loading">⏳ جارٍ تحميل المنتجات...</div>
        </div>
        
        <footer>
            <p>جميع الحقوق محفوظة © 2026</p>
            <p>للتواصل: اضغط على زر الواتساب تحت أي منتج</p>
        </footer>
    </div>
    
    <script>
        const STORE_CONFIG = {
            storeName: "دبوس اونلاين",
            whatsappNumber: "9613947353",
            currency: "$"
        };
        
        let products = [];
        let categories = [];
        
        function formatPrice(price) {
            return price.toLocaleString() + " " + STORE_CONFIG.currency;
        }
        
        function getWhatsAppMessage(product) {
            const message = `مرحباً، أريد الاستفسار عن المنتج:\n\n` +
                           `*${product.name}*\n` +
                           `السعر: ${formatPrice(product.price)}\n` +
                           `المواصفات: ${product.description}\n\n` +
                           `هل يتوفر؟`;
            return encodeURIComponent(message);
        }
        
        function renderFilters() {
            const filterContainer = document.getElementById('filterContainer');
            filterContainer.innerHTML = categories.map((cat, index) => 
                `<button class="filter-btn ${index === 0 ? 'active' : ''}" 
                         onclick="filterProducts('${cat}', this)">${cat}</button>`
            ).join('');
        }
        
        function renderProducts(productsToRender) {
            const productsGrid = document.getElementById('productsGrid');
            productsGrid.innerHTML = productsToRender.map(product => `
                <div class="product-card">
                    <img src="${product.image}" alt="${product.name}" class="product-image" onerror="this.src='https://via.placeholder.com/400x300/667eea/ffffff?text=لا+توجد+صورة'">
                    <div class="product-info">
                        <div class="product-category">${product.category}</div>
                        <div class="product-name">${product.name}</div>
                        <div class="product-description">${product.description}</div>
                        <div class="product-price">${formatPrice(product.price)}</div>
                        <a href="https://wa.me/${STORE_CONFIG.whatsappNumber}?text=${getWhatsAppMessage(product)}" 
                           class="whatsapp-btn" target="_blank">
                            📱 اطلب عبر واتساب
                        </a>
                    </div>
                </div>
            `).join('');
        }
        
        function filterProducts(category, btn) {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            
            if (category === 'الكل') {
                renderProducts(products);
            } else {
                renderProducts(products.filter(p => p.category === category));
            }
        }
        
        function init() {
            document.getElementById('storeName').textContent = STORE_CONFIG.storeName;
            renderFilters();
            renderProducts(products);
        }
        
        // ===== تحميل البيانات من Google Sheets =====
        const SHEET_ID = "13bsXvpSZSGRBwiJqiGPCFG3LonORgLUdGUXRwn7PjJ0";
        
        // تحميل المنتجات
        fetch(`https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=Products`)
            .then(res => res.text())
            .then(text => {
                const json = JSON.parse(text.substr(47).slice(0, -2));
                
                products = json.table.rows.map(row => {
                    const c = row.c;
                    return {
                        id: c[0] ? c[0].v : 0,
                        name: c[1] ? c[1].v : '',
                        category: c[2] ? c[2].v : '',
                        description: c[3] ? c[3].v : '',
                        price: c[4] ? c[4].v : 0,
                        image: c[5] ? c[5].v : ''
                    };
                });
                
                // تحميل التصنيفات
                fetch(`https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=Categories`)
                    .then(res => res.text())
                    .then(text => {
                        const json = JSON.parse(text.substr(47).slice(0, -2));
                        categories = ["الكل", ...json.table.rows.map(row => row.c[0] ? row.c[0].v : '')];
                        init();
                    })
                    .catch(() => {
                        const uniqueCats = [...new Set(products.map(p => p.category))];
                        categories = ["الكل", ...uniqueCats];
                        init();
                    });
            })
            .catch(error => {
                console.error('Error:', error);
                document.getElementById('productsGrid').innerHTML = 
                    `<div class="error">
                        ❌ حدث خطأ في تحميل المنتجات<br>
                        <small>${error.message}</small>
                    </div>`;
            });
    </script>
</body>
</html>
